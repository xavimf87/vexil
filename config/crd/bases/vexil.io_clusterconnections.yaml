apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterconnections.vexil.io
spec:
  group: vexil.io
  names:
    kind: ClusterConnection
    listKind: ClusterConnectionList
    plural: clusterconnections
    singular: clusterconnection
    shortNames:
      - cc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Version
          type: string
          jsonPath: .status.kubernetesVersion
        - name: Workloads
          type: integer
          jsonPath: .status.discoveredWorkloads
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [displayName, authMethod, apiServer, credentialRef]
              properties:
                displayName:
                  type: string
                authMethod:
                  type: string
                  enum: [kubeconfig, serviceaccount, oidc]
                apiServer:
                  type: string
                credentialRef:
                  type: object
                  required: [name, key]
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                namespaces:
                  type: array
                  items:
                    type: string
                resyncPeriod:
                  type: string
                  default: "30s"
                labels:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                kubernetesVersion:
                  type: string
                lastProbe:
                  type: string
                  format: date-time
                discoveredWorkloads:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
