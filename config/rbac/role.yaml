apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vexil-operator
rules:
  # FeatureFlag CRD
  - apiGroups: ["vexil.io"]
    resources: ["featureflags"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["vexil.io"]
    resources: ["featureflags/status"]
    verbs: ["get", "update", "patch"]
  # ClusterConnection CRD
  - apiGroups: ["vexil.io"]
    resources: ["clusterconnections"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["vexil.io"]
    resources: ["clusterconnections/status"]
    verbs: ["get", "update", "patch"]
  # Workload discovery
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # ConfigMap management
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Namespace listing for discovery
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Secrets for cluster credentials (read-only)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vexil-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vexil-operator
subjects:
  - kind: ServiceAccount
    name: vexil-operator
    namespace: vexil-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vexil-operator
  namespace: vexil-system
