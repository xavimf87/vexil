{{- if .Values.apiserver.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexil.fullname" . }}-apiserver
  namespace: {{ include "vexil.namespace" . }}
  labels:
    {{- include "vexil.apiserver.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apiserver.replicas }}
  selector:
    matchLabels:
      {{- include "vexil.apiserver.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vexil.apiserver.selectorLabels" . | nindent 8 }}
      {{- with .Values.apiserver.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "vexil.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "vexil.serviceAccountName" . }}
      {{- with .Values.apiserver.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: apiserver
          image: {{ include "vexil.apiserver.image" . }}
          imagePullPolicy: {{ .Values.apiserver.image.pullPolicy }}
          args:
            - --port={{ .Values.apiserver.port }}
            - --cors-origins={{ .Values.apiserver.corsOrigins }}
          ports:
            - name: http
              containerPort: {{ .Values.apiserver.port }}
              protocol: TCP
          env:
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexil.postgresql.secretName" . }}
                  key: password
            {{- end }}
            - name: VEXIL_DATABASE_URL
              value: {{ include "vexil.databaseURL" . }}
            {{- if .Values.auth.enabled }}
            - name: VEXIL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexil.fullname" . }}-admin
                  key: admin-password
            {{- end }}
            {{- with .Values.apiserver.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.apiserver.resources | nindent 12 }}
          {{- with .Values.apiserver.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.apiserver.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiserver.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiserver.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vexil.fullname" . }}-apiserver
  namespace: {{ include "vexil.namespace" . }}
  labels:
    {{- include "vexil.apiserver.labels" . | nindent 4 }}
  {{- with .Values.apiserver.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.apiserver.service.type }}
  ports:
    - port: {{ .Values.apiserver.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vexil.apiserver.selectorLabels" . | nindent 4 }}
{{- end }}
