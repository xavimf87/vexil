{{- if .Values.auth.enabled }}
{{- $secretName := printf "%s-admin" (include "vexil.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" (include "vexil.namespace" .) $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "vexil.namespace" . }}
  labels:
    {{- include "vexil.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.auth.adminPassword }}
  admin-password: {{ .Values.auth.adminPassword | b64enc | quote }}
  {{- else if and $existingSecret $existingSecret.data }}
  admin-password: {{ index $existingSecret.data "admin-password" }}
  {{- else }}
  admin-password: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
{{- end }}
