apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "vexil.fullname" . }}-test-connection"
  namespace: {{ include "vexil.namespace" . }}
  labels:
    {{- include "vexil.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    {{- if .Values.apiserver.enabled }}
    - name: test-apiserver
      image: busybox:1.36
      command: ['sh', '-c']
      args:
        - |
          echo "Testing API server health endpoint..."
          wget -qO- http://{{ include "vexil.fullname" . }}-apiserver:{{ .Values.apiserver.service.port }}/healthz
          echo ""
          echo "Testing API server flags endpoint..."
          wget -qO- http://{{ include "vexil.fullname" . }}-apiserver:{{ .Values.apiserver.service.port }}/api/v1/flags
          echo ""
          echo "Testing API server clusters endpoint..."
          wget -qO- http://{{ include "vexil.fullname" . }}-apiserver:{{ .Values.apiserver.service.port }}/api/v1/clusters
          echo ""
          echo "All API server tests passed!"
    {{- end }}
    {{- if .Values.web.enabled }}
    - name: test-web
      image: busybox:1.36
      command: ['sh', '-c']
      args:
        - |
          echo "Testing web portal..."
          wget -qO- --spider http://{{ include "vexil.fullname" . }}-web:{{ .Values.web.service.port }}/
          echo "Web portal test passed!"
    {{- end }}
